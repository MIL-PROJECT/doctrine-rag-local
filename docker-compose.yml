# Ollama는 Compose에 포함하지 않습니다. Colab GPU + ngrok 등 원격 URL을 .env 의 OLLAMA_BASE_URL 로 지정하세요.
services:
  backend:
    build:
      context: ./backend
    container_name: doctrine-rag-ollama-backend
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-EMPTY}
      VLLM_TIMEOUT_SECONDS: ${VLLM_TIMEOUT_SECONDS:-120}
      ARMY_MODEL: ${ARMY_MODEL:-army}
      NAVY_MODEL: ${NAVY_MODEL:-navy}
      AIR_MODEL: ${AIR_MODEL:-air}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-4096}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-2048}
      VLLM_MIN_OUTPUT_TOKENS: ${VLLM_MIN_OUTPUT_TOKENS:-768}
      VLLM_RAG_CONTEXT_CHAR_LIMIT: ${VLLM_RAG_CONTEXT_CHAR_LIMIT:-3200}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      A2A_BLOCKCHAIN_ENABLED: ${A2A_BLOCKCHAIN_ENABLED:-false}
      A2A_CACHE_ENABLED: ${A2A_CACHE_ENABLED:-false}
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      CHROMA_DIR: chroma_db
      CHUNKS_DATA_DIR: data/chunks
    env_file:
      - .env
    volumes:
      # 호스트의 backend 소스를 그대로 쓰면 코드 수정이 이미지 재빌드 없이 반영됩니다.
      - ./backend:/app
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/data:/app/data
      - hf_cache:/app/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 480s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_TOP_K_MAX: ${NEXT_PUBLIC_TOP_K_MAX:-20}
    container_name: doctrine-rag-ollama-frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  hf_cache:
