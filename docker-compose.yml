# Ollama는 Compose에 포함하지 않습니다. Colab GPU + ngrok 등 원격 URL을 .env 의 OLLAMA_BASE_URL 로 지정하세요.
services:
  backend:
    build:
      context: ./backend
    container_name: doctrine-rag-ollama-backend
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      CHROMA_DIR: chroma_db
      CHUNKS_DATA_DIR: data/chunks
    env_file:
      - .env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/data:/app/data
      - hf_cache:/app/.cache/huggingface
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 480s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_TOP_K_MAX: ${NEXT_PUBLIC_TOP_K_MAX:-20}
    container_name: doctrine-rag-ollama-frontend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  hf_cache:
