services:
  backend:
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      A2A_BLOCKCHAIN_ENABLED: ${A2A_BLOCKCHAIN_ENABLED:-false}
      A2A_CACHE_ENABLED: ${A2A_CACHE_ENABLED:-false}
      CHROMA_DIR: chroma_db
      CHUNKS_DATA_DIR: data/chunks
    volumes:
      - ./backend:/app
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/data:/app/data
      - hf_cache:/app/.cache/huggingface
    healthcheck:
      test:
        ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s
    restart: unless-stopped

  frontend:
    user: "0:0"
    command: >
      sh -c "npm ci --include=dev --include=optional && npm run dev"
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_TOP_K_MAX: ${NEXT_PUBLIC_TOP_K_MAX:-20}
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  frontend_node_modules:
  frontend_next_cache:
