name: Deploy AWS CloudFormation

on:
  push:
    branches:
      - main
    paths:
      - "deploy/aws/**"
      - "docker-compose.yml"
      - "backend/**"
      - "frontend/**"
  workflow_dispatch:
    inputs:
      stack_name:
        description: "CloudFormation stack name"
        required: false
        default: "doctrine-rag-ec2"
      git_branch:
        description: "Git branch for EC2 bootstrap clone"
        required: false
        default: "main"
      instance_type:
        description: "EC2 instance type"
        required: false
        default: "t3.large"
      allowed_cidr:
        description: "Ingress CIDR for 22/3000/8000"
        required: false
        default: "0.0.0.0/0"
      vpc_id:
        description: "VPC ID to create resources in"
        required: true
      subnet_id:
        description: "Subnet ID to launch EC2 in"
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  STACK_NAME: ${{ inputs.stack_name || vars.CFN_STACK_NAME || 'doctrine-rag-ec2' }}
  TEMPLATE_FILE: deploy/aws/cloudformation.yaml
  INSTANCE_TYPE: ${{ inputs.instance_type || vars.INSTANCE_TYPE || 't3.large' }}
  GIT_REPO: ${{ vars.GIT_REPO || format('https://github.com/{0}.git', github.repository) }}
  GIT_BRANCH: ${{ inputs.git_branch || github.ref_name }}
  ALLOWED_CIDR: ${{ inputs.allowed_cidr || vars.ALLOWED_CIDR || '0.0.0.0/0' }}
  VPC_ID: ${{ inputs.vpc_id || vars.VPC_ID || '' }}
  SUBNET_ID: ${{ inputs.subnet_id || vars.SUBNET_ID || '' }}
  KEY_NAME: ${{ vars.KEY_NAME || '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --region "$AWS_REGION" \
            --template-body "file://$TEMPLATE_FILE" >/dev/null

      - name: Deploy stack
        run: |
          if [ -z "$VPC_ID" ] || [ -z "$SUBNET_ID" ]; then
            echo "VPC_ID and SUBNET_ID must be set via workflow inputs or repo variables." >&2
            exit 1
          fi

          PARAMS=(
            "InstanceType=$INSTANCE_TYPE"
            "GitRepositoryUrl=$GIT_REPO"
            "GitBranch=$GIT_BRANCH"
            "AllowedCidr=$ALLOWED_CIDR"
            "VpcId=$VPC_ID"
            "SubnetId=$SUBNET_ID"
          )
          if [ -n "$KEY_NAME" ]; then
            PARAMS+=("KeyName=$KEY_NAME")
          fi

          aws cloudformation deploy \
            --region "$AWS_REGION" \
            --stack-name "$STACK_NAME" \
            --template-file "$TEMPLATE_FILE" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "${PARAMS[@]}"

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table
