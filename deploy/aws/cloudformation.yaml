AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Single EC2 (Amazon Linux 2023) + Docker — Git clone 후 docker compose up.
  NEXT_PUBLIC_API_URL 은 부팅 시 IMDS public IP 로 주입.

Parameters:
  InstanceType:
    Type: String
    Default: t3.large
    Description: Ollama + 임베딩 동시 구동 권장 (인제스트 포함이면 xlarge 이상).

  KeyName:
    Type: String
    Default: ""
    Description: SSH Key Pair 이름. 비우면 SSM Session Manager만 (콘솔에서 EC2 Connect).

  GitRepositoryUrl:
    Type: String
    Default: https://github.com/MIL-PROJECT/doctrine-rag-local.git

  GitBranch:
    Type: String
    Default: main

  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: 22/3000/8000 허용 CIDR — 운영에서는 좁히세요.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: EC2와 Security Group을 생성할 VPC ID

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: EC2를 실행할 Subnet ID

  RootVolumeGiB:
    Type: Number
    Default: 80
    MinValue: 30

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyName, ""]]

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: doctrine-rag SSH + Next 3000 + API 8000
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: !Ref AllowedCidr
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: !Ref AllowedCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref SubnetId
      KeyName: !If [HasKeyPair, !Ref KeyName, !Ref AWS::NoValue]
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeGiB
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -ex
              exec > >(tee /var/log/doctrine-rag-bootstrap.log|logger -t bootstrap -s 2>/dev/console) 2>&1

              dnf update -y
              # AL2023는 curl-minimal이 기본인 경우가 있어 curl 패키지 설치 시 충돌할 수 있음
              dnf install -y docker git curl-minimal
              systemctl enable docker
              systemctl start docker
              usermod -aG docker ec2-user || true

              if ! dnf install -y docker-compose-plugin; then
                mkdir -p /usr/local/lib/docker/cli-plugins
                curl -fsSL "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64" \
                  -o /usr/local/lib/docker/cli-plugins/docker-compose
                chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              fi

              APP_DIR=/opt/doctrine-rag
              mkdir -p "$APP_DIR"
              cd "$APP_DIR"

              REPO="${GitUrl}"
              BRANCH="${GitBranch}"
              rm -rf app
              git clone --depth 1 --branch "$BRANCH" "$REPO" app
              cd app

              printf '%s\n' \
                'OLLAMA_BASE_URL=https://REPLACE_WITH_NGROK_OR_REMOTE_OLLAMA_URL' \
                'OLLAMA_MODEL=qwen2.5:3b' \
                'CHROMA_DIR=chroma_db' \
                'CHUNKS_DATA_DIR=data/chunks' \
                'EMBEDDING_MODEL=BAAI/bge-m3' \
                'LOG_LEVEL=INFO' \
                'CORS_ORIGINS=*' \
                > .env

              TOKEN=$(curl -fsS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
              PUB=$(curl -fsS -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4 || true)
              test -n "$PUB" || PUB=127.0.0.1

              printf '%s\n' \
                'services:' \
                '  frontend:' \
                '    build:' \
                '      args:' \
                '        NEXT_PUBLIC_API_URL: http://PLACEHOLDER_IP:8000' \
                > docker-compose.aws.yml
              sed -i "s/PLACEHOLDER_IP/$PUB/g" docker-compose.aws.yml

              docker compose -f docker-compose.yml -f docker-compose.aws.yml up -d --build
            - GitUrl: !Ref GitRepositoryUrl
              GitBranch: !Ref GitBranch

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref AppInstance

  PublicIp:
    Description: 공인 IP
    Value: !GetAtt AppInstance.PublicIp

  PublicDnsName:
    Description: 퍼블릭 DNS
    Value: !GetAtt AppInstance.PublicDnsName

  UrlHint:
    Description: 브라우저 접속 예시
    Value: !Sub "UI http://${AppInstance.PublicIp}:3000 | API http://${AppInstance.PublicIp}:8000"
